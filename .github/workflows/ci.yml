name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt flake8
      - name: Check PEP8
        run: flake8 main.py test_main.py
      - name: Run tests
        run: pytest --html=report.html